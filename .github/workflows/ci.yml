name: CI

# Gate de qualidade (ISO): roda em todo push e PR para a main.
# Backend = pytest; Frontend = type-check + build. Verde obrigatorio antes do merge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Instala dependencias
        run: pip install -r requirements.txt
      - name: pytest
        run: python -m pytest tests/ -q

  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json
      - name: Instala dependencias
        run: npm ci
      - name: Type-check + build
        run: npm run build
